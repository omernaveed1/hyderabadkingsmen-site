<header class="site-header">
  <div class="container">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-mark">HK</span>
      <span class="brand-name">{{ .Site.Title }}</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
